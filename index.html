<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Cloudcroft | Coming Soon</title>
    <meta name="description" content="Cloudcroft, New Mexico — a new guide to everything worth exploring at 9,000 feet. Sign up to be the first to know when we launch.">
    <link rel="canonical" href="https://discovercloudcroft.com/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pine: #2D5016;
            --pine-light: #3A6B1E;
            --cream: #FAF8F3;
            --cream-dark: #F0EDE5;
            --gold: #C8943E;
            --gold-hover: #B5832E;
            --charcoal: #2C2C2C;
            --charcoal-light: #555555;
            --charcoal-muted: #888888;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Subtle mountain silhouette background */
        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 35vh;
            background:
                linear-gradient(165deg, transparent 40%, rgba(45, 80, 22, 0.04) 40.5%, rgba(45, 80, 22, 0.04) 55%, transparent 55.5%),
                linear-gradient(195deg, transparent 35%, rgba(45, 80, 22, 0.03) 35.5%, rgba(45, 80, 22, 0.03) 50%, transparent 50.5%),
                linear-gradient(175deg, transparent 30%, rgba(45, 80, 22, 0.05) 30.5%, rgba(45, 80, 22, 0.05) 60%, transparent 60.5%);
            pointer-events: none;
            z-index: 0;
        }

        /* Pine tree silhouettes */
        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20vh;
            background:
                linear-gradient(to top, rgba(45, 80, 22, 0.06) 0%, transparent 100%);
            mask-image:
                /* Tree 1 */
                linear-gradient(to right, transparent 5%, transparent 7%, rgba(0,0,0,1) 7.5%, rgba(0,0,0,1) 8.5%, transparent 9%, transparent 100%),
                linear-gradient(160deg, transparent 45%, rgba(0,0,0,1) 46%, rgba(0,0,0,1) 54%, transparent 55%),
                /* Tree 2 */
                linear-gradient(to right, transparent 88%, rgba(0,0,0,1) 88.5%, rgba(0,0,0,1) 90%, transparent 90.5%),
                linear-gradient(160deg, transparent 40%, rgba(0,0,0,1) 41%, rgba(0,0,0,1) 50%, transparent 51%);
            mask-composite: add;
            -webkit-mask-composite: source-over;
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 480px;
            width: 100%;
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .wordmark {
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--pine);
            margin-bottom: 3rem;
        }

        h1 {
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: clamp(2rem, 6vw, 2.75rem);
            color: var(--charcoal);
            line-height: 1.15;
            margin-bottom: 1.25rem;
        }

        .subhead {
            font-size: 1.05rem;
            line-height: 1.65;
            color: var(--charcoal-light);
            margin-bottom: 2.5rem;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-container {
            background: white;
            border-radius: 16px;
            padding: 1.75rem;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
            margin-bottom: 1rem;
        }

        .form-row {
            display: flex;
            gap: 0.75rem;
        }

        .form-row input[type="email"] {
            flex: 1;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            padding: 0.85rem 1.1rem;
            border: 1.5px solid var(--cream-dark);
            border-radius: 10px;
            background: var(--cream);
            color: var(--charcoal);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-row input[type="email"]::placeholder {
            color: var(--charcoal-muted);
        }

        .form-row input[type="email"]:focus {
            border-color: var(--pine);
            box-shadow: 0 0 0 3px rgba(45, 80, 22, 0.1);
        }

        .form-row button {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.85rem 1.5rem;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .form-row button:hover {
            background: var(--gold-hover);
            box-shadow: 0 4px 12px rgba(200, 148, 62, 0.3);
            transform: translateY(-1px);
        }

        .form-row button:active {
            transform: translateY(0);
        }

        .reassurance {
            font-size: 0.8rem;
            color: var(--charcoal-muted);
            margin-top: 1rem;
            letter-spacing: 0.02em;
        }

        /* Success state */
        .success-message {
            display: none;
            padding: 1.5rem;
        }

        .success-message .check {
            width: 48px;
            height: 48px;
            background: var(--pine);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            animation: scaleIn 0.4s ease-out;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .success-message .check svg {
            width: 24px;
            height: 24px;
            stroke: white;
            stroke-width: 2.5;
            fill: none;
        }

        .success-message h2 {
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--charcoal);
            margin-bottom: 0.5rem;
        }

        .success-message p {
            font-size: 0.95rem;
            color: var(--charcoal-light);
            line-height: 1.5;
        }

        .form-container.success .form-row,
        .form-container.success + .reassurance {
            display: none;
        }

        .form-container.success .success-message {
            display: block;
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
            }

            .form-row button {
                padding: 0.9rem 1.5rem;
            }

            .form-container {
                padding: 1.25rem;
            }

            .wordmark {
                margin-bottom: 2.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="wordmark">DiscoverCloudcroft.com</div>
        <h1>Something's coming to the mountains.</h1>
        <p class="subhead">Cloudcroft, New Mexico &mdash; elevation 9,000 ft. A new guide to everything worth exploring. Be the first to know when we launch.</p>
        <div class="form-container" id="formContainer">
            <form class="form-row" id="signupForm" onsubmit="return false;">
                <input type="email" id="emailInput" placeholder="Your email address" required autocomplete="email" aria-label="Email address">
                <button type="submit">Notify Me</button>
            </form>
            <div class="success-message">
                <div class="check">
                    <svg viewBox="0 0 24 24"><polyline points="6 12 10 16 18 8"></polyline></svg>
                </div>
                <h2>You're on the list!</h2>
                <p>We'll let you know when Discover Cloudcroft goes live.</p>
            </div>
        </div>
        <div class="reassurance">No spam. Just mountain news.</div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('emailInput').value;
            if (email) {
                document.getElementById('formContainer').classList.add('success');
            }
        });
    </script>
</body>
</html>
