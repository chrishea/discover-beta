Welcome to Cloudcroft, New Mexico — a mountain village with timeless charm and plenty to do.
Whether you’re looking for a cozy cabin, a good meal, or ideas for a scenic day trip, this list is here to help you make the most of your visit.
Here you’ll find local restaurants, lodging, shops, and services — everything you need to explore, relax, and enjoy your time in our beautiful mountain community.
————————————————
Eat/Drink
Big Daddy’s Diner (1705 James Canyon Hwy, (575) 682-1224, bigdaddysdinernm.com) Comfort food and desserts. Try the fried chicken basket. Open daily 7:00 a.m.-9:00 p.m.
Black Bear Coffee (200 Burro Ave., (575) 682-1239, mybbcoffee.com) Locally-roasted beans on the west end of Burro. Head upstairs for conversation nooks, enjoy the downstairs gallery wall with rotating exhibition. Wednesday-Saturday 8:00 a.m.-4:00 p.m., Sunday 8:00-3:00.
Brother-N-Law BBQ (209 James Canyon Hwy, (215) 858-0400) Delicious smoked meats, baked potatoes, sandwiches, and fried okra. Don’t skip the sauce. Open 11:00. a.m.-6:00 p.m. every day but Thursday. 
Burro Street Bakery (505 Burro Ave., (575) 682-2777) Sit awhile at this centrally-located joint. Pies, danishes, breakfast burritos, coffee, and more. Open 7:00 a.m.-5:00 p.m. daily. 
Cloud 9000 Coffee (96 James Canyon Hwy) Quick breakfast—smoothies and handhelds. Coffee, tea, and lemonade, too. Outdoor seating only.  7:00 a.m.-2:00 p.m. Tuesday-Friday, 8:00 a.m.-4:00 p.m. Saturday and Sunday, closed Mondays. 
Cloudcroft Brewing Company (1301 Burro Ave., (575) 682-2337, cloudcroftbrewing.com) In-house and regional brews, live music, and fantastic atmosphere. Gnosh on wood-fired pizza, soup du jour, salad, chips & guacamole. Closed Tuesdays. Open 11:00 a.m.-9:00 p.m. the rest of the week—til 10:00 p.m. Friday and Saturday. 
Cloudcroft Sandwich Shop (505 Burro Ave., (575) 551-0065, cloudcroftsandwich.shop) Traditional deli in the Burro Street Exchange. Mural photo op in the outdoor patio. Get any sandwich as a salad, then a monster-sized cookie—#balance. Open 11:00 a.m.-4:00 p.m. every day, closed Wednesdays. 
Dave’s Cafe (300 Burro Ave., (575) 682-2127) Classic burgers, fries, and more at a casual setting in the heart of Burro. Open 11:00 a.m.-8:00 p.m. Monday-Thursday, and 11:00 a.m.-9:00 p.m. Friday-Sunday. 
Dusty Boots Cafe & Taco Cantina (1317 James Canyon Hwy, 575) 601-2009) Laid back home cooking—burgers, tacos, salads, and more. For breakfast, try the veggie-loaded Hiker’s Boot omelette and western potatoes. Open 7:00 a.m.-7:00 p.m. Monday-Thursday, 7:00 a.m.-7:00 p.m. Friday and Saturday, closes at 5:00 Sunday. 
Eight the Cake Bakery (506 Burro Ave., (575) 682-3088, eightthecakellc.com) Lovely custom cakes. Cupcakes, cinnamon rolls, and local art. Open Thursday-Monday from 10:00 a.m.-5:00 p.m. 
Family Dollar (309 James Canyon Hwy, (505) 532-2697, familydollar.com) Get the essentials. Discount chain with groceries, toiletries, and home goods. Open 8:00 a.m.-10:00 p.m. daily. 
Fernando’s Burritos (96 James Canyon Hwy) Best burrito, barbacoa, and burger in the village. Breakfast, lunch, and dinner. Outdoor seating only. Open 7:00 a.m.-7:00 p.m. daily, closed Mondays. 
High Rollin’ Coffee (109 James Canyon Hwy) Gourmet freshies galore on a rotating weekly menu. Open Monday and Tuesday 8:00 a.m.-1:00 p.m., and Friday-Sunday 8:00 a.m.-3:00 p.m.
Higher Grounds (300 Burro Ave., 575) 682-2127) Ice cream and milkshake counter next to Dave’s Cafe. Hours vary. 
Instant Karma Chai Bar (302 Burro Ave.) Global spice blends, ayurvedic teas, soothing cacao, and more at their countertop. Stay awhile. Open daily from 1:00-5:00 p.m.
KennaBelle’s Kreations Bakery (308 Burro Ave., (575) 682-2712) Follow your nose to this pink patisserie. Custom cakes and orders. Gluten-free options. Open 7:00 a.m.- 5:00 p.m. Monday-Saturday. Closed Sunday. 
Mad Jack’s Mountaintop Barbeque (105 James Canyon Hwy, (575) 682-7577) Legendary barbeque in the old mercantile building. Don’t let the line deter you—it’s worth the wait. Open 11:00 a.m.-3:00 p.m. Thursday-Sunday, or until sold out.
Noisy Water Winery (505 Burro Ave., (575) 682-6610) Local wine, cheese, charcuterie, and gifts. Upscale offerings, casual boardwalk venue. Open 10:00 a.m.-6:30 p.m. daily, open until 7:00 on Friday, and until 7:30 on Saturday. 
Old Barrel Tea Co. (505 Burro Ave., (575) 682-7474) Fresh house-blend teas to order, plus provisions. Open 11:00 a.m.-5:00 p.m. Monday-Friday. Open 10:00 a.m.-6:00 p.m. Saturday, 10:00 a.m.-5:00 p.m. Sunday. 
Saint Andrew’s Lounge and 1899 at the Lodge (601 Corona Pl., (575) 682-2566, 223collectionhotels.com/the-lodge) Chef Richard Lepree brings global flair and locally-sourced flavors to the plate. Reservations required on the 1899 side, open Wednesday-Saturday from 5:00-8:00 p.m. Saint Andrew’s Lounge open Wednesday-Saturday from 12:00-8:00 p.m. 
The Distillery (1303 Burro Ave., (575) 682-2337) Craft cocktails with New Mexico and in-house spirits for date night—adults only. 
Cloudcroft Brewing Company pizza by the slice. Open M, W, TH 4:00-9:00 p.m., Friday 4:00-10:00 p.m., Saturday 11:00 a.m.-10:00 p.m., and Sunday 11:00 a.m.-9:00 p.m.
Western Bar and Cafe and Package Store (304 Burro Ave., (575) 682-2445, westernbarandcafe.net) Dark and cozy dive bar with tasty food for lunch and dinner. Beer on tap, full bar. Play pool while you wait. Closed Wednesdays, open 11:00 a.m.-10:00 p.m. the rest of the week. 
Lodging
Burro St. Boarding House (608 Burro Ave., (575) 682-3601) Rustic and artful digs near downtown. burrostreetboardinghouse.com
Cabins at Cloudcroft (1006 Coyote Ave., 575-682-2396) Retro casitas by the park. cabinsatcloudcroft.com
Crofting Inn (300 Swallow Pl.) Comfy B-and-B. Book on Expedia or Hotels.com
Dusty Boots Motel (1315 James Canyon Hwy, (575) 682-7736) Themed rooms with a restaurant next door. thedustyboots.com
Grand Cloudcroft Hotel (1207 James Canyon Hwy, (575) 601-2202) Relax in the indoor pool and spa. All king-sized beds. grandcloudcroft.com
Osha Trail Lodging (102 Mexican Ave., (575) 937-3767) Modern, conveniently-located suites. Book on AirBnB or oshatraillodging@gmail.com
SugarPines RV Park (601 Columbine Blvd., (575) 682-3375) Easy access in the heart of the village. sugarpinesrvpark.com
Summit Inn (103 Chipmunk Ave., (575) 295-3235) Chic interiors, classic mountain exterior. summitinnnm.com
The Lodge (601 Corona Pl., (575) 682-2566) Historic beauty. Stay, eat, play. thelodgeresort.com
Shopping
Aspen and Ivy Boutique (206 Burro Ave.) Bespoke goods, candles, plants, and local art. Open Thursday-Sunday 11:00 a.m.-4:00 p.m.
Base Camp 9K (302 Burro Ave.) Teeny space with quality shirts, hats, and more. Open Friday and Saturday 10:00 a.m.-5:00 p.m., Sunday 11:00 a.m.-4:00 p.m.
Burro Street Trading Post (505 Burro Ave., (225) 253-2606) Rocks, gems, and original Southwest art and wear. Open 10:00 a.m.-5:00 p.m. daily. burrostreettradingpost.com 
Cloudcroft Archery (100 Little Glorieta Ave., (575) 439-7918) Indoor range and bow services. 11:00 a.m.-6:00 p.m. Tuesday-Friday, Saturday 10:00 a.m.-6:00 p.m.
Cloudcroft Souvenirs (502 Burro Ave.) Southwestern tchotchkes and take-home memorabilia. Open Monday-Saturday 10:00 a.m.-5:00 p.m., Sunday 1:00-5:00 p.m.
Cloudcroft Truck & Auto Parts (94 James Canyon Hwy, (575) 682-6002 Requisite auto supplies. Open 7:30 a.m. - 5:00 p.m. Monday-Friday, Saturday 9:00 a.m.-1:00 p.m. Closed Sunday. 
Coco Blu (94 Little Glorieta Ave., (575) 682-3039) Ladies’ boutique with head-to-toe stylish selections and name brands. Open 10:30 a.m.-5:00 p.m. Sunday-Thursday, and until 5:30 p.m. on Friday and 6:00 p.m. on Saturday. 
The Elk Shed (505 Burro Ave.) Southwestern goods, clothes, gourmet pantry staples, and more. Open 11:00 a.m. to 5:00 p.m. daily. theelkshed.com
The Fat Rabbit (206 Burro Ave.) Silver and turquoise, plus. Open 10:00 a.m.-5:00 p.m. Tuesday-Sunday. 
The Highland (206 James Canyon Hwy, (575) 682-1041) Nambe, gifts, hunting supplies, licenses, and beyond. Open 10:00 a.m.-6:00 p.m. daily.
High Altitude (310 Burro Ave. (575) 682-1229) Your favorite little outdoors store, boutique, and bike shop. 10:00 a.m.-5:30 p.m. Monday-Thursday, until 6:00 p.m. Friday and Saturday, until 5:00 p.m. Sunday. highaltitudenm.com
Homee (109 James Canyon Hwy) Everything for sale. Home rental services. Hours vary. inhomee.com
Instant Karma (302 Burro Ave., (575) 682-2651) Ayurvedic goods, yogi-friendly clothes, books, and yoga. Open 11:00 a.m.-5:00 p.m. daily.  getinstantkarma.com
King’s Treasure (202 Burro Ave. (575) 682-5524) Thrift to your heart’s delight without breaking the bank. Open 10:00 a.m.-5:00 p.m. every day except Sunday.
Magnum’s Guns II (207 James Canyon Hwy (575) 682-6677) Guns and ammo on James Canyon Highway. 1:00-4:00 p.m. Monday, Wednesday to Friday from 12:00-5:00 p.m., Saturday 11:00 a.m.-5:00 p.m. magnumsguns.com
Mountain Magic (506 Burro Ave. (575) 682-2348) Cloudcroft shirts, woodland toys, baby gifts, natural goods, and more. Open 10:00 a.m.-5:00 p.m. daily. 
New Village Hardware (61 Curlew Pl. (575) 682-2849) Everything you need for your latest project. Open 7:00 a.m.-5:00 p.m. Monday-Saturday, 10:00 a.m.-4:00 p.m. Sunday. 
Osha Trail Depot (102 Mexican Ave. 575-551-2099) Local art, woodworking, and New-Mexican goods. Interested artists inquire: oshatraildepot@gmail.com. Open 10:00 a.m.-5:00 p.m. every day. 
Poke The Bear (510 Burro Ave. 575-682-1341) Find the music playing on Burro boardwalk for fun and unique finds—lamps, upcycled furniture, outdoor goods, t-shirts, and humor gifts. Open 9:00 a.m.-5:00 p.m. daily. 
Red Wall Jewelry (505 Burro Ave. 
575-682-4414) Delicate and artisanal wares–great for gifts. Open 10:00 a.m.-5:00 p.m. daily. 
Roots Flower Co. (62 Curlew Pl. (575) 295-1644) High-end flowers and affordable prices. Bouquets of all sizes, event orders. Open 10:00 a.m.-5:00 p.m. Tuesday-Saturday. 
Seasons Boutique Gift Shop (601 Corona Pl. (575) 682-2566) Shop at the historic Lodge. 
The Bear Track (308 Burro Ave.) Baubles, figurines, woodland critter decor, and more. Hours vary. 
Tree-Riffic Toys and Candy (505 Burro Ave. (575) 682-2566) Goodies for all ages. Open M, Th, Fri, Sat 10:30 a.m-5:30 p.m., W 10:30 a.m.-5:00 p.m., Sun 12:00-5:00 p.m.
Tree Top Teez (505 Burro Ave. (575) 430-5154) Custom silk-screen and embroidery shop. Open 7:00 a.m.-5:00 p.m. Monday-Friday. 
Turquoise Shop (507 Burro Ave. (575) 682-3327) Fine jewelry at every price point. Open 10:00 a.m. to 5:00 p.m. each day, closed Sunday. cloudcroftturquoise.com
Art
Cloudcroft Art Society Co-op Gallery (90 Swallow Pl.) Artist-run rotating gallery. Open seasonal Saturdays 10:00 a.m.-3:00 p.m. and for holiday sales. ccartsociety@gmail.com
Off the Beaten Path (100 Glorietta Ave. (575) 682-7284) Regional handmade art selection of all media. Open 10:30 a.m.-4:00 p.m. Friday and Saturday, 11:00 a.m.-4:00 p.m. Sunday. offthebeatenpathstuff.com

Samantha Odom Art Gallery (300 Burro Ave. (575) 649-9951) Original paintings and affordable prints by Samantha Odom. Open 11:00 a.m.-4:00 p.m. Friday and Saturday. 
The Little Gallery (206 Burro Ave.) Fine arts and paintings by local artists, and funky souvenirs. Open Wednesday-Sunday 11:00 a.m.-5:00 p.m. or by appointment. 
Healing
Be in the Mountains Yoga & Massage Therapy (109 James Canyon Hwy (575) 415-4573) Cozy space and comfortable pace in the Village Plaza. Open by appointment at yogaincloudcroft.com
Cloudcroft Animal Hospital (1403 James Canyon Hwy (575) 682-2645) Critter care and adoptions. Open 8:30 a.m.-12:00 p.m. and 1:30-5:00 p.m. Monday-Friday. 
Cloudcroft Therapeutic Massage (404 Burro Ave.) Relax and recover upstairs at the OCEC building. Open by appointment at cloudcrofttherapeuticmassage.com
Laughing Leaf Dispensary (504 Burro Ave. (575) 682-1354) Locally-owned bud tender. Open 10:00 a.m.-6:00 p.m. Monday-Thursday, 9:00 a.m.-7:00 p.m. Friday and Saturday, and 9:00 a.m.-6:00 p.m. Sunday. 
Presbyterian Medical Center (76 James Canyon Hwy (575) 682-2542) Clinic by appointment or walk-in. Open 7:00 a.m.-6:00 p.m. Monday-Friday.
Southwest Naturals CBD (506 Burro Ave. (575) 682-6022) Range of CBD products, vitamins, and supplements in store. Open Monday 9:00 a.m.-5:00 p.m. and Friday-Sunday 10:30 a.m.-5:00 p.m.
Trestle Medical Services (1200 James Canyon Hwy) Local family practitioner. Open Mondays, Wednesdays, Thursdays, and Fridays from 9:30-11:30 a.m. and 12:30-4:00 p.m. trestlemedical.com
Services
Atelier Art of Hair by Anna (505 Burro Ave. (415) 230-9506) Pamper your hair, style your photoshoot. Available by appointment vagaro.com/lacnb9/services
Bhair Neccessities (202 Burro Ave. (575) 518-9011) Classic color, cuts, and products. Available by appointment.
Cloudcroft Fitness (90 Swallow Pl.) Get moving with a range of class offerings and instructors. cloudcroftcycling.punchpass.com
Cloudcroft Village Office (201 Burro Ave.) Pay your water bill, attend village meetings, and more.cloudcroftvillage.com
Cloudsoft Laundry To Go (520-330-2613) Delivery service. 
Crystal Tompkins Photography Family photos, headshots, business branding, soul sessions, and more. By appointment: crystaltompkinsphotography.com
First National Bank (301 Burro Ave. (575) 682-2531) Money on the mountain, outdoor ATM. Open 9:00 a.m-3:00 p.m. Monday-Thursday, 9:00 a.m.-5:00 p.m. Friday. 
Green Mountain Construction (500 Burro Ave. (575) 551-2811) Local development. Open 8:00 a.m-5:00 p.m. Monday-Friday. greenmountainconstr.com
High Valley Weaving School (90 Swallow Pl. 575-921-1020) Modern courses in ancient fiber techniques. Class schedules: highvalleyweavingschool.com
Pre-School and Extended Care (50 Chipmunk (575) 682-1264) Local childcare. 
Rick Roger’s Auto & Equipment Repair (72 James Canyon Hwy (575) 682-3352) Gas and diesel mechanic services. Open Monday-Friday 8:00 a.m.-12:00 p.m. and 1:00-5:00 p.m. 
Sacramento Mountain Senior Services (212 Glorietta Ave. 575-682-3022) Cafeteria and social hub. mtnseniors.org
U.S. Post Office (20 Curlew Pl. (800) 275-8777) Mail and passport services. Open 8:00 a.m.-4:00 p.m. Monday-Friday, Saturday 9:30-11:30 a.m.
1CAT Trap & Release Program (100 Glorietta Ave. 575-682-7284) Non-profit feline care. Available by appointment. 
Play
Cosmic Adventures (cosmicadventuresnm.com) Snow-mobile tours and more
Deer Park Playground (30 Swallow Pl.) Behind the Burro St. Exchange. Picnic tables, easy downtown access. 
Elevation Park (230 Mescalero Ave.) Disc golf, trailheads, and stargazing. 
James Sewell Ice Rink (751 James Canyon Hwy) On the west end of Zenith Park. Seasonal skate rentals, snack bar, fireplace. 
Pickleball Addicts of Cloudcroft (pickleballaddictsofcloudcroft.com) Join them! Regular seasonal play at Zenith Park. 
Ski Cloudcroft (1920 1/2 Hwy 82) Southernmost ski area in NM—skiing, tubing, wood-fired pizza, and more. 
The Lodge Golf Course (703 Corona Ave.) Scottish 9 in the clouds. Visit the pro shop for gear, snacks, and drinks. 
Zenith Park (1001 James Canyon Hwy) Meadow in the middle of the village with playgrounds, ice rink, disc golf, walking, path, pickleball courts, and more. 
