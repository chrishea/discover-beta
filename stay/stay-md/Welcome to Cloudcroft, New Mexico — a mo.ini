Day Trip
Alameda Park Zoo (35 minutes) Observe critters in the Southwest’s oldest zoo. Educational programs, a playground, and summer camps available. ci.alamogordo.nm.us/816/Alameda-Park-Zoo
American Armed Forces Museum (23 minutes) Archives, memorabilia, and memorial garden. Volunteers welcome. americanarmedforcesmuseum.com
Cadwallader Mountain Farms (14 minutes) High-elevation orchards with scenic views and “u-pick” seasons. Find them on Facebook for updates. 
La Luz, NM (24 minutes) Tularosa Basin settlement at the base of the Sacramento Mountains. 
Lincoln National Forest Scenic Byway (Varies) Winding drives past basin views, mountain meadows, wildlife, and beyond. fs.usda.gov/r03/lincoln/recreation/opportunities/scenic-drives
Mayhill, NM (23 minutes) Neighbors to the east. 
Museum of Space History (30 minutes): Exhibits, education, memorials, playground, and theater. nmspacemuseum.org
Nichols Ranch and Orchards (35 minutes) Seasonal harvests and events. nicholsranchandorchards.com
Oliver Lee Memorial State Park (47 minutes) Desert camping, historic site, and hiking. emnrd.nm.gov/spd/find-a-park/oliver-lee-memorial-state-park/
Sacramento, NM (48 minutes) Mountain hamlet nestled in the Sacramentos. 
Silver Lake (17 minutes) RV and tent camping, fishing, and more on the Mescalero Apache Reservation. mescaleroapachetribe.com/parks-rec/silver-lake-official/
Three Rivers Petroglyph Site (59 minutes) One of the largest and most interesting rock art sites in the Southwest. blm.gov/visit/three-rivers-petroglyph-site
Timberon, NM (55 minutes) Mountain community surrounded by gorgeous forest–gas up on your way, no station for miles. timberon.org
Tularosa Basin Museum of History (31 minutes) area history with a full research library, gift shop, and bookstore. 
Valley of Fires (80 minutes) Lava park featuring trails, visitor center, picnic areas, and campsite hookups. blm.gov/visit/valley-fires-recreation-area
Weed, NM (41 minutes) Mountain community, home of the Weed Bluegrass Festival. weednm.org
White Sands National Park (45 minutes) Otherworldly chalky dunes–pack sunscreen and water. nps.gov/whsa/index.htm Railroad Dr.)
